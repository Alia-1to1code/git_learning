site_name: Documentation git_learning
site_description: Projet d'apprentissage Git et GitHub
site_author: Alia Poonie
site_url: https://Alia-1to1code.github.io/git_learning/

repo_name: alia1to1/git_learning
repo_url: https://github.com/Alia-1to1code/git_learning

theme:
  name: material
  language: fr
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Passer en mode sombre
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Passer en mode clair
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.code.copy

nav:
  - Accueil: index.md
  - Guide:
      - Installation: guide/installation.md
      - Utilisation: guide/utilisation.md
  - Référence API:
      - Calculator: api/calculator.md

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - admonition
  - pymdownx.details
  