name: Déploiement de la documentation

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'          # Se déclenche seulement si docs/ est modifié
      - 'mkdocs.yml'
  workflow_dispatch:       # Déclenchement manuel possible

# Permissions nécessaires pour déployer sur GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Empêcher les déploiements simultanés
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Construire la documentation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du code
        uses: actions/checkout@v5

      - name: Configurer Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Installer MkDocs et Material
        run: |
          pip install mkdocs mkdocs-material

      - name: Construire le site statique
        run: mkdocs build --strict --verbose

      - name: Uploader les pages GitHub
        uses: actions/upload-pages-artifact@v5
        with:
          path: site/    # Dossier généré par mkdocs build

  deploy:
    name: Déployer sur GitHub Pages
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Déployer sur GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4